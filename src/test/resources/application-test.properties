spring.application.name=gaira-test

spring.datasource.url=jdbc:h2:mem:gaira_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

jwt.secret=test-secret-key-for-ci-only
jwt.expiration=900000
auth.refresh-expiration-seconds=604800
auth.max-failed-attempts=5

spring.flyway.enabled=false
