spring.application.name=gaira-test

spring.datasource.url=jdbc:h2:mem:gaira_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

jwt.secret=test-secret-key-for-ci-only
jwt.expiration=900000
jwt.issuer=test-issuer
auth.refresh-expiration-seconds=604800
auth.max-failed-attempts=5

spring.flyway.enabled=false

cors.allowed-origins=http://localhost:3000
seed.admin.username=admin
seed.admin.password=admin
seed.admin.email=admin@test.com
throttle.capacity=100
throttle.refill-tokens=100
throttle.refill-seconds=60
app.storage.gcs.bucket-name=test-bucket
# Disable Redis listener container for tests
spring.redis.enabled=false
spring.data.redis.url=redis://localhost:6379
