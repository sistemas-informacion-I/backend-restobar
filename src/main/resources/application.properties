spring.application.name=gaira
spring.config.import=optional:file:.env[.properties]

# Server
server.port=3000

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update 
#validate
spring.jpa.show-sql=true
#true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.issuer=${JWT_ISSUER}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Authentication
auth.refresh-expiration-seconds=${AUTH_REFRESH_EXPIRATION_SECONDS}
auth.max-failed-attempts=${AUTH_MAX_FAILED_ATTEMPTS:5}
auth.lockout-duration-minutes=${AUTH_LOCKOUT_DURATION_MINUTES:3}

# Seed
seed.admin.username=${SEED_ADMIN_USERNAME}
seed.admin.password=${SEED_ADMIN_PASSWORD}
seed.admin.email=${SEED_ADMIN_EMAIL}

# Rate limiting
throttle.capacity=${THROTTLE_CAPACITY}
throttle.refill-tokens=${THROTTLE_REFILL_TOKENS}
throttle.refill-seconds=${THROTTLE_REFILL_SECONDS}

# Flyway
# ConfiguraciĂ³n de Redis (Prioridad absoluta a la URL)
spring.data.redis.url=${REDIS_URL:${REDIS_PRIVATE_URL:}}

# Los siguientes valores solo se usan si la URL de arriba estĂ¡ vacĂ­a (como en local)
# En Railway, al estar definida REDIS_URL, Spring Boot ignorarĂ¡ estas 3:
spring.data.redis.host=${REDISHOST:${REDIS_HOST:localhost}}
spring.data.redis.port=${REDISPORT:${REDIS_PORT:6379}}
spring.data.redis.password=${REDISPASSWORD:${REDIS_PASSWORD:}}

spring.aop.proxy-target-class=true
