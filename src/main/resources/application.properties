spring.application.name=gaira
spring.jackson.time-zone=America/La_Paz
spring.jpa.properties.hibernate.jdbc.time_zone=America/La_Paz
spring.config.import=optional:file:.env[.properties]

# Server
server.port=3000

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update 
#validate
spring.jpa.show-sql=true
#true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.issuer=${JWT_ISSUER}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Authentication
auth.refresh-expiration-seconds=${AUTH_REFRESH_EXPIRATION_SECONDS}
auth.max-failed-attempts=${AUTH_MAX_FAILED_ATTEMPTS:5}
auth.lockout-duration-minutes=${AUTH_LOCKOUT_DURATION_MINUTES:3}

# Seed
seed.admin.username=${SEED_ADMIN_USERNAME}
seed.admin.password=${SEED_ADMIN_PASSWORD}
seed.admin.email=${SEED_ADMIN_EMAIL}

# Rate limiting
throttle.capacity=${THROTTLE_CAPACITY}
throttle.refill-tokens=${THROTTLE_REFILL_TOKENS}
throttle.refill-seconds=${THROTTLE_REFILL_SECONDS}

# Redis Configuration (Priority to URL)
spring.data.redis.url=${REDIS_URL:${REDIS_PRIVATE_URL:}}

# Fallback values for local development
spring.data.redis.host=${REDISHOST:${REDIS_HOST:localhost}}
spring.data.redis.port=${REDISPORT:${REDIS_PORT:6379}}
spring.data.redis.password=${REDISPASSWORD:${REDIS_PASSWORD:}}

spring.aop.proxy-target-class=true

# Security properties
spring.main.allow-bean-definition-overriding=true

# Email Configuration
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.from=${SPRING_MAIL_FROM:${SPRING_MAIL_USERNAME}}
spring.mail.group-copy=${SPRING_MAIL_GROUP_COPY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=${SPRING_MAIL_DEBUG:false}

# Timeouts (Increased for cloud environments)
spring.mail.properties.mail.smtp.timeout=20000
spring.mail.properties.mail.smtp.connectiontimeout=20000
spring.mail.properties.mail.smtp.writetimeout=20000

# Support for SSL on ports like 465
spring.mail.properties.mail.smtp.ssl.enable=${SPRING_MAIL_SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3

# Socket Factory (Required for port 465 in many environments)
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false
spring.mail.properties.mail.smtp.socketFactory.port=${SPRING_MAIL_PORT:587}
